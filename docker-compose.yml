services:
  postgres:
    image: postgres:16-alpine
    container_name: toefl-postgres
    environment:
      POSTGRES_USER: toefl
      POSTGRES_PASSWORD: toefl_local_dev
      POSTGRES_DB: toefl_mock
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toefl -d toefl_mock"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: toefl-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: toefl-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_local
      MINIO_ROOT_PASSWORD: minio_local_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: toefl-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio_local minio_local_dev &&
      mc mb --ignore-existing local/toefl-assets &&
      mc mb --ignore-existing local/toefl-recordings &&
      mc mb --ignore-existing local/toefl-reports &&
      exit 0
      "

  mailpit:
    image: axllent/mailpit:latest
    container_name: toefl-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres-data:
  redis-data:
  minio-data:
